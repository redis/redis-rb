---
name: Test
on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - '**/*.md'

jobs:
  lint:
    name: Rubocop
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Lint
        run: bundle exec rubocop

  test:
    name: "${{ matrix.ruby_distribution }} (${{ matrix.ruby_version }}) Redis (${{ matrix.redis_version }}) Driver (${{ matrix.driver }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ruby_distribution: [MRI, TruffleRuby]
        ruby_version: ["3.3", "3.4", "4.0"]
        redis_version: ["7.2.14", "7.4.9", "8.2.6", "8.8.0", "8.10-rc2"]
        driver: [default, hiredis]
        exclude:
          # TruffleRuby's C extension support (Sulong) cannot build hiredis cleanly.
          - { ruby_distribution: TruffleRuby, driver: hiredis }
          # TruffleRuby tracks one Ruby compat level at a time; cover it on 3.4 only.
          - { ruby_distribution: TruffleRuby, ruby_version: "3.3" }
          - { ruby_distribution: TruffleRuby, ruby_version: "4.0" }
    env:
      REDIS_VERSION: ${{ matrix.redis_version }}
      # RedisJSON et al. ship in Redis core only from 8.0. On the 7.2/7.4 rows the module tests
      # run against a Redis Stack instance (port 6383) booted from the version-matched rs- tag;
      # on >= 8 REDIS_STACK_VERSION is empty (no Stack booted) and the module tests run against
      # the standalone instance (port 6381).
      REDIS_STACK_VERSION: ${{ startsWith(matrix.redis_version, '7.2') && 'rs-7.2.0-v20' || startsWith(matrix.redis_version, '7.4') && 'rs-7.4.0-v8' || '' }}
      REDIS_MODULES_PORT: ${{ (startsWith(matrix.redis_version, '7.2') || startsWith(matrix.redis_version, '7.4')) && '6383' || '6381' }}
      DRIVER: ${{ matrix.driver == 'hiredis' && 'hiredis' || 'ruby' }}
      LOW_TIMEOUT: "0.14"
      # TruffleRuby defaults to a throughput-tuned JIT mode that warms up slowly;
      # latency mode keeps short test runs from blowing the per-step timeout.
      # The variable is a no-op on MRI.
      TRUFFLERUBYOPT: ${{ matrix.ruby_distribution == 'TruffleRuby' && '--engine.Mode=latency' || '' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Ruby (MRI)
        if: matrix.ruby_distribution == 'MRI'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}
          bundler-cache: true

      - name: Set up Ruby (TruffleRuby)
        if: matrix.ruby_distribution == 'TruffleRuby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: truffleruby
          bundler-cache: true

      - name: Install cluster gem dependencies
        env:
          BUNDLE_GEMFILE: cluster/Gemfile
        run: bundle install

      - name: Boot Redis (all topologies)
        run: docker compose --profile all up -d --wait

      # Only on Redis < 8, where modules aren't in core; on >= 8 the module tests use standalone.
      - name: Boot Redis Stack (module tests on Redis < 8)
        if: env.REDIS_STACK_VERSION != ''
        run: docker compose --profile modules up -d --wait

      # The suite runs under both RESP protocols: RESP3 first (the default), then RESP2 to verify
      # protocol compatibility. Replies must be identical under both.
      - name: Run standalone, distributed, sentinel, module suites (RESP3)
        env:
          PROTOCOL: "3"
        run: bundle exec rake test:redis test:distributed test:sentinel test:modules

      - name: Run standalone, distributed, sentinel, module suites (RESP2)
        env:
          PROTOCOL: "2"
        run: bundle exec rake test:redis test:distributed test:sentinel test:modules

      - name: Run cluster suite (RESP3)
        env:
          BUNDLE_GEMFILE: cluster/Gemfile
          TIMEOUT: "15"
          PROTOCOL: "3"
        run: bundle exec rake test:cluster

      - name: Run cluster suite (RESP2)
        env:
          BUNDLE_GEMFILE: cluster/Gemfile
          TIMEOUT: "15"
          PROTOCOL: "2"
        run: bundle exec rake test:cluster

      - name: Tear down Redis
        if: always()
        run: docker compose --profile all --profile modules down -v
